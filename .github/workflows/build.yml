name: Build CityBuild Plugin

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 16
      uses: actions/setup-java@v4
      with:
        java-version: '16'
        distribution: 'temurin'
        cache: maven
    
    - name: Build with Maven
      run: mvn clean package -DskipTests
    
    - name: Upload JAR as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CityBuildPlugin
        path: target/CityBuildPlugin-1.0-SNAPSHOT.jar
        retention-days: 30
