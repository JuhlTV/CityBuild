name: Build CityBuild Plugin JAR

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    
    - name: Build with Maven
      run: mvn -B clean package -DskipTests
      working-directory: ./CityBuild-Plugin
    
    - name: Upload JAR as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CityBuildPlugin-JAR
        path: CityBuild-Plugin/target/CityBuildPlugin-*.jar
        retention-days: 30
    
    - name: Get JAR filename
      id: jar
      run: echo "filename=$(ls CityBuild-Plugin/target/CityBuildPlugin-*.jar | head -1 | xargs basename)" >> $GITHUB_OUTPUT
    
    - name: Create Release on Tag
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: CityBuild-Plugin/target/CityBuildPlugin-*.jar
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
