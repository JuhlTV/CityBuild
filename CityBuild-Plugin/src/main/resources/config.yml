# Economy Settings
economy:
  starting_balance: 10000
  plot_buy_price: 5000
  plot_sell_price: 4000

# Daily Rewards
daily_rewards:
  daily_amount: 500                 # Base $500 per day
  streak_bonus: 100                 # +$100 per consecutive day

# World Settings
worlds:
  plot_world: "cityplot"           # Plot world (flat map)
  farm_world: "cityfarm"           # Farm/Resource world (normal map)
  pvp_world: "citypvp"             # PVP world (normal map)
  
# Plot System
plots:
  size: 16                          # 16x16 blocks per plot
  spacing: 2                        # 2 blocks spacing between plots
  plots_per_row: 10                 # 10 plots per row in grid

# Shop Settings
shop:
  enabled: true
  # Default items are auto-generated on first run

# Database
database:
  type: json
  files:
    players: plugins/CityBuild/data/players.json
    plots: plugins/CityBuild/data/plots.json
    shop: plugins/CityBuild/data/shop.json
    daily: plugins/CityBuild/data/dailyrewards.json

# Messages
messages:
  prefix: "&8[&bCityBuild&8] &r"
  insufficient_funds: "&cInsufficient funds! Need ${needed}, Have ${have}"
  plot_purchased: "&aPlot purchased! Plot #{plot_id}"
  plot_sold: "&aPlot sold for ${amount}!"
  no_plots: "&cYou don't own any plots!"
