name: CityBuild
version: 2.0.0
main: com.citybuild.CityBuildPlugin
description: Complete City Building System with Economy, Plots, Shop, Bank & Daily Rewards
authors: [JuhlTV]
api-version: 1.20.4

commands:
  citybuild:
    description: Main CityBuild command
    usage: /citybuild <command>
    aliases: [cb, city]
    subcommands:
      # Economy
      - balance
      - daily
      - pay
      - bank
      # Plots
      - buy
      - sell
      - info
      - tpplot
      # Shop
      - shop
      # Worlds
      - tpfarm
      - tppvp
      # Info
      - leaderboard
      - help
      - admin
