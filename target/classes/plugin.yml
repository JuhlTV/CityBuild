name: CityBuild
version: 1.0-SNAPSHOT
description: Complete City Building System for Minecraft
author: CityBuild Team
main: com.citybuild.CityBuildPlugin

commands:
  plot:
    description: Plot management commands
    usage: /plot <buy|sell|info|list>
  economy:
    description: Economy commands
    usage: /economy <balance|pay|check>
  terrain:
    description: Terrain generation commands
    usage: /terrain <generate|settings>
  admin:
    description: Admin commands
    usage: /admin <reload|reset|stats>
  shop:
    description: Shop commands
    usage: /shop <create|remove|info>
  lb:
    description: Leaderboard commands
    usage: /lb <richest|ach|plots|farmers>
    aliases: [leaderboard]
  ach:
    description: Achievement commands
    usage: /ach [progress]
    aliases: [achievements]
  guild:
    description: Guild management commands
    usage: /guild <create|join|leave|info|members>
    aliases: [g]
  trade:
    description: Trading commands
    usage: /trade <start|offer|accept|cancel|status>
    aliases: [exchange]
  rank:
    description: Rank and progression commands
    usage: /rank [player]
    aliases: [rating]
  auction:
    description: Auction house commands
    usage: /auction <create|list|bid|my|info|cancel|stats>
    aliases: [ah]
  cosmetics:
    description: Cosmetics and customization
    usage: /cosmetics <title|color|rainbow|particles|info|reset>
    aliases: [cosmetic, skins]

permissions:
  citybuild.plot.buy:
    description: Allow players to buy plots
    default: true
  citybuild.plot.sell:
    description: Allow players to sell plots
    default: true
  citybuild.economy.pay:
    description: Allow players to send money
    default: true
  citybuild.admin:
    description: Admin permissions
    default: op
  citybuild.leaderboard:
    description: View leaderboards
    default: true
  citybuild.achievements:
    description: View achievements
    default: true
  citybuild.guild:
    description: Guild commands
    default: true
  citybuild.trade:
    description: Trading commands
    default: true
  citybuild.rank:
    description: Rank and progression commands
    default: true
  citybuild.auction:
    description: Auction house commands
    default: true
  citybuild.cosmetics:
    description: Cosmetics and customization
    default: true
