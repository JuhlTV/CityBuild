name: CityBuild
version: 1.0-SNAPSHOT
description: Complete City Building System for Minecraft
author: CityBuild Team
main: com.citybuild.CityBuildPlugin

commands:
  plot:
    description: Plot management commands
    usage: /plot <buy|sell|info|list>
  economy:
    description: Economy commands
    usage: /economy <balance|pay|check>
  terrain:
    description: Terrain generation commands
    usage: /terrain <generate|settings>
  admin:
    description: Admin commands
    usage: /admin <reload|reset|stats>
  shop:
    description: Shop commands
    usage: /shop <create|remove|info>
  lb:
    description: Leaderboard commands
    usage: /lb <richest|ach|plots|farmers>
    aliases: [leaderboard]
  ach:
    description: Achievement commands
    usage: /ach [progress]
    aliases: [achievements]
  guild:
    description: Guild management commands
    usage: /guild <create|join|leave|info|members>
    aliases: [g]
  trade:
    description: Trading commands
    usage: /trade <start|offer|accept|cancel|status>
    aliases: [exchange]
  rank:
    description: Rank and progression commands
    usage: /rank [player]
    aliases: [rating]
  auction:
    description: Auction house commands
    usage: /auction <create|list|bid|my|info|cancel|stats>
    aliases: [ah]
  cosmetics:
    description: Cosmetics and customization
    usage: /cosmetics <title|color|rainbow|particles|info|reset>
    aliases: [cosmetic, skins]
  quest:
    description: Quest management commands
    usage: /quest <active|completed|all|info|stats>
    aliases: [q, quests]
  clan:
    description: Clan management
    usage: /clan <create|join|leave|info|members|list>
    aliases: [c, clans]
  event:
    description: Advancement events
    usage: /event <active|view|info|stats|leaderboard>
    aliases: [events, advancement]
  dungeon:
    description: Dungeon exploration
    usage: /dungeon <list|enter|leave|info|stats>
    aliases: [d, dungeons]
  treasure:
    description: Treasure hunting
    usage: /treasure <search|nearest|stats|discoveries>
    aliases: [t, treasures]
  npc:
    description: NPC traders
    usage: /npc <list|info|find|stats>
    aliases: [trader, traders]
  config:
    description: Configuration management (admin only)
    usage: /config <view|reload|summary|set>
    aliases: [cfg, settings]

permissions:
  citybuild.plot.buy:
    description: Allow players to buy plots
    default: true
  citybuild.plot.sell:
    description: Allow players to sell plots
    default: true
  citybuild.economy.pay:
    description: Allow players to send money
    default: true
  citybuild.admin:
    description: Admin permissions
    default: op
  citybuild.leaderboard:
    description: View leaderboards
    default: true
  citybuild.achievements:
    description: View achievements
    default: true
  citybuild.guild:
    description: Guild commands
    default: true
  citybuild.trade:
    description: Trading commands
    default: true
  citybuild.rank:
    description: Rank and progression commands
    default: true
  citybuild.auction:
    description: Auction house commands
    default: true
  citybuild.cosmetics:
    description: Cosmetics and customization
    default: true
  citybuild.quest:
    description: Quest system
    default: true
  citybuild.clan:
    description: Clan system
    default: true
  citybuild.event:
    description: Advancement events
    default: true
  citybuild.dungeon:
    description: Dungeon system
    default: true
  citybuild.treasure:
    description: Treasure hunting
    default: true
  citybuild.npc:
    description: NPC traders
    default: true
  citybuild.config:
    description: Configuration management
    default: op
  citybuild.admin:
    description: Admin commands
    default: op
